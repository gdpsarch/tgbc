<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TG Bot Client Pro</title>
    <style>
        :root { --tg-blue: #0088cc; --bg: #f0f2f5; --border: #dfe5e9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; overflow: hidden; }

        /* Экран приветствия */
        #login-screen { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        #login-box { width: 100%; max-width: 450px; text-align: center; background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .logo { width: 70px; margin-bottom: 20px; }
        .guide { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 14px; line-height: 1.5; }
        
        input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 15px; outline: none; font-size: 16px; }
        .btn { padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; background: var(--tg-blue); color: white; transition: 0.2s; }
        
        /* Основной интерфейс */
        #sidebar { width: 320px; background: white; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #sb-header { padding: 15px; border-bottom: 1px solid var(--border); }
        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #f8f9fa; cursor: pointer; }
        .chat-item.active { background: #e7f3ff; border-left: 4px solid var(--tg-blue); }

        #chat-main { flex: 1; display: flex; flex-direction: column; background: #e7ebf0 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        #chat-header { height: 64px; background: white; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 70%; padding: 10px 14px; border-radius: 15px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
        .msg.in { align-self: flex-start; background: white; border-bottom-left-radius: 2px; }
        .msg.out { align-self: flex-end; background: #effdde; border-bottom-right-radius: 2px; }
        
        #input-area { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--border); }
        .hidden { display: none !important; }
        .small-btn { font-size: 10px; padding: 5px; background: #eee; color: #666; border-radius: 5px; cursor: pointer; border: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div id="login-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="logo">
            <h1>Добро пожаловать!</h1>
            <p style="color: #666;">Управляйте своим ботом через этот удобный интерфейс.</p>
            
            <div class="guide">
                <b>Как начать:</b>
                <ul style="margin-left: 20px;">
                    <li>Напишите <b>@BotFather</b> в Telegram.</li>
                    <li>Получите <code>API Token</code> вашего бота.</li>
                    <li>Вставьте его в поле ниже.</li>
                </ul>
            </div>

            <input type="password" id="token-input" placeholder="Вставьте токен сюда...">
            <button class="btn" style="width: 100%" onclick="tryLogin()">ВОЙТИ</button>
            <p style="font-size: 11px; color: #aaa; margin-top: 15px;">Токен сохраняется только в вашем браузере.</p>
        </div>
    </div>

    <div id="sidebar">
        <div id="sb-header">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: bold; color: var(--tg-blue);">MESSENGER</span>
                <button onclick="logout()" style="color:red; background:none; border:none; cursor:pointer; font-weight: bold;">ВЫЙТИ</button>
            </div>
            <button class="small-btn" onclick="clearHistory()">🗑 Очистить историю</button>
        </div>
        <div id="chat-list"></div>
    </div>

    <div id="chat-main">
        <div id="chat-header">Выберите чат</div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Нажмите '/' чтобы начать писать..." style="margin: 0;">
            <button class="btn" onclick="sendMsg()" style="width: auto; padding: 0 20px;">✈</button>
        </div>
    </div>

    <script>
        let BOT_TOKEN = localStorage.getItem("tg_token") || "";
        let CURRENT_ID = null;
        let lastId = 0;
        let history = JSON.parse(localStorage.getItem('tg_history')) || {};
        let names = JSON.parse(localStorage.getItem('tg_names')) || {};
        const sound = new Audio('https://notificationsounds.com/storage/sounds/file-sounds-1150-pristine.mp3');

        if (BOT_TOKEN) startApp();

        async function tryLogin() {
            const t = document.getElementById('token-input').value.trim();
            if (!t) return;
            const res = await fetch(`https://api.telegram.org/bot${t}/getMe`);
            const d = await res.json();
            if (d.ok) {
                localStorage.setItem("tg_token", t);
                BOT_TOKEN = t;
                await Notification.requestPermission();
                startApp();
            } else alert("Неверный токен!");
        }

        function startApp() {
            document.getElementById('login-screen').classList.add('hidden');
            Object.keys(names).forEach(id => addChatUI(id, names[id]));
            setInterval(poll, 2000);
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        async function poll() {
            if (!BOT_TOKEN) return;
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastId + 1}`);
                const data = await res.json();
                if (data.ok && data.result.length > 0) {
                    data.result.forEach(u => {
                        lastId = u.update_id;
                        if (u.message && u.message.text) {
                            const cid = u.message.chat.id;
                            const name = u.message.from.first_name || "Пользователь";
                            const txt = u.message.text;
                            
                            saveMsg(cid, txt, 'in');
                            addChatUI(cid, name);
                            
                            if (CURRENT_ID == cid) render(txt, 'in');
                            else {
                                sound.play().catch(()=>{});
                                if (Notification.permission === "granted") new Notification(name, {body: txt});
                            }
                        }
                    });
                }
            } catch (e) {}
        }

        function saveMsg(cid, text, type) {
            if (!history[cid]) history[cid] = [];
            history[cid].push({text, type});
            localStorage.setItem('tg_history', JSON.stringify(history));
        }

        function addChatUI(id, name) {
            names[id] = name;
            localStorage.setItem('tg_names', JSON.stringify(names));
            if (document.getElementById(`chat-${id}`)) return;
            const item = document.createElement('div');
            item.id = `chat-${id}`;
            item.className = 'chat-item';
            item.innerHTML = `<strong>${name}</strong><br><small>ID: ${id}</small>`;
            item.onclick = () => {
                CURRENT_ID = id;
                document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                document.getElementById('chat-header').innerText = name;
                document.getElementById('messages').innerHTML = "";
                (history[id] || []).forEach(m => render(m.text, m.type));
            };
            document.getElementById('chat-list').prepend(item);
        }

        function render(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            const c = document.getElementById('messages');
            c.appendChild(div);
            c.scrollTop = c.scrollHeight;
        }

        async function sendMsg() {
            const i = document.getElementById('msg-input');
            const txt = i.value.trim();
            if (!txt || !CURRENT_ID) return;
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CURRENT_ID, text: txt })
            });
            if (res.ok) {
                saveMsg(CURRENT_ID, txt, 'out');
                render(txt, 'out');
                i.value = "";
            }
        }

        function clearHistory() {
            if(confirm("Удалить всю историю сообщений?")) {
                localStorage.removeItem('tg_history');
                history = {};
                if (CURRENT_ID) document.getElementById('messages').innerHTML = "";
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault(); document.getElementById('msg-input').focus();
            }
            if (e.key === 'Enter' && document.activeElement.id === 'msg-input') sendMsg();
        });
    </script>
</body>
</html>
