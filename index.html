<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Bot Client Max</title>
    <style>
        :root { --tg-blue: #0088cc; --bg: #f0f2f5; --border: #dfe5e9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; overflow: hidden; -webkit-touch-callout: none; }

        #login-screen { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        #login-box { width: 100%; max-width: 400px; text-align: center; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 15px; outline: none; font-size: 15px; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; background: var(--tg-blue); color: white; transition: 0.2s; }
        
        #sidebar { width: 320px; background: white; border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        #sb-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #f8f9fa; cursor: pointer; }
        .chat-item.active { background: #e7f3ff; border-left: 4px solid var(--tg-blue); }

        #chat-main { flex: 1; display: flex; flex-direction: column; background: #e7ebf0 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); position: relative; }
        #chat-header { height: 60px; background: white; padding: 0 20px; display: flex; align-items: center; border-bottom: 1px solid var(--border); font-weight: bold; z-index: 10;}
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        
        #drop-zone { position: absolute; inset: 0; background: rgba(0, 136, 204, 0.9); color: white; display: none; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; z-index: 50; border: 4px dashed white; border-radius: 10px; margin: 10px; }

        .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; cursor: context-menu; position: relative; }
        .msg.in { align-self: flex-start; background: white; border-bottom-left-radius: 2px; }
        .msg.out { align-self: flex-end; background: #effdde; border-bottom-right-radius: 2px; }
        .msg img { max-width: 100%; border-radius: 8px; margin-bottom: 5px; cursor: pointer; }
        .reply-block { font-size: 12px; background: rgba(0,0,0,0.05); border-left: 3px solid var(--tg-blue); padding: 4px 8px; border-radius: 4px; margin-bottom: 5px; color: #555; }
        
        #reply-preview { background: #f4f8fb; padding: 10px 15px; border-top: 1px solid var(--border); display: none; justify-content: space-between; align-items: center; border-left: 4px solid var(--tg-blue); }
        #reply-text { font-size: 13px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90%; }
        #input-area { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--border); align-items: center; }
        #attach-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #666; transition: 0.2s; padding: 5px; }
        #attach-btn:hover { color: var(--tg-blue); }
        
        #context-menu { position: absolute; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border-radius: 8px; overflow: hidden; display: none; z-index: 1000; flex-direction: column; min-width: 150px; }
        .menu-item { padding: 12px 15px; font-size: 14px; cursor: pointer; transition: 0.1s; display: flex; gap: 10px; }
        .menu-item:hover { background: #f0f2f5; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="context-menu">
        <div class="menu-item" onclick="actionReply()">↩️ Відповісти</div>
        <div class="menu-item" id="menu-edit" onclick="actionEdit()">✏️ Редагувати</div>
        <div class="menu-item" onclick="closeMenu()" style="color: red;">❌ Скасувати</div>
    </div>

    <div id="login-screen">
        <div id="login-box">
            <h2>Bot Client Max</h2><br>
            <input type="password" id="token-input" placeholder="Вставте API Token...">
            <button class="btn" style="width: 100%" onclick="tryLogin()">УВІЙТИ</button>
        </div>
    </div>

    <div id="sidebar">
        <div id="sb-header">
            <b style="color: var(--tg-blue)">Чати / Групи</b>
            <button onclick="logout()" style="color:red; background:none; border:none; cursor:pointer;">Вийти</button>
        </div>
        <div id="chat-list"></div>
    </div>

    <div id="chat-main">
        <div id="drop-zone">Відпустіть картинку для відправки</div>
        <div id="chat-header">Виберіть чат</div>
        <div id="messages" onclick="closeMenu()"></div>
        
        <div id="reply-preview">
            <div id="reply-text">Відповідь на: ...</div>
            <button onclick="cancelReply()" style="background:none; border:none; cursor:pointer; font-size:16px;">✖</button>
        </div>
        
        <div id="input-area">
            <button id="attach-btn" onclick="document.getElementById('file-input').click()">📎</button>
            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
            
            <input type="text" id="msg-input" placeholder="Напишіть або вставте (Ctrl+V) фото...">
            <button class="btn" onclick="sendMsg()">✈</button>
        </div>
    </div>

    <script>
        let BOT_TOKEN = localStorage.getItem("tg_token") || "";
        let CURRENT_ID = null;
        let lastId = 0;
        let history = JSON.parse(localStorage.getItem('tg_history')) || {};
        let names = JSON.parse(localStorage.getItem('tg_names')) || {};
        
        let replyingToId = null;
        let editingMsgId = null;
        let selectedMsg = null; 

        if (BOT_TOKEN) startApp();

        async function tryLogin() {
            const t = document.getElementById('token-input').value.trim();
            if(!t) return;
            const res = await fetch(`https://api.telegram.org/bot${t}/getMe`);
            if ((await res.json()).ok) {
                localStorage.setItem("tg_token", t); BOT_TOKEN = t; startApp();
            } else alert("Помилка токена");
        }

        function startApp() {
            document.getElementById('login-screen').classList.add('hidden');
            Object.keys(names).forEach(id => addChatUI(id, names[id]));
            setInterval(poll, 2000);
        }

        async function poll() {
            if (!BOT_TOKEN) return;
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastId + 1}`);
                const data = await res.json();
                if (data.ok && data.result.length > 0) {
                    for (let u of data.result) {
                        lastId = u.update_id;
                        const msgObj = u.message || u.channel_post; 
                        
                        if (msgObj) {
                            const cid = msgObj.chat.id;
                            const name = msgObj.chat.title || msgObj.from?.first_name || "Користувач"; 
                            const msgId = msgObj.message_id;
                            const replyTxt = msgObj.reply_to_message ? (msgObj.reply_to_message.text || "📷 Фото") : null;
                            
                            let txt = msgObj.text || msgObj.caption || "";
                            let imgUrl = null;

                            if (msgObj.photo) {
                                const photo = msgObj.photo[msgObj.photo.length - 1];
                                const fileRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${photo.file_id}`);
                                const fileData = await fileRes.json();
                                if (fileData.ok) {
                                    imgUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${fileData.result.file_path}`;
                                    if (!txt) txt = "📷 Фото";
                                }
                            }

                            if (txt || imgUrl) {
                                saveMsg(cid, msgId, txt, 'in', replyTxt, imgUrl);
                                addChatUI(cid, name);
                                if (CURRENT_ID == cid) render(msgId, txt, 'in', replyTxt, imgUrl);
                            }
                        }
                    }
                }
            } catch (e) {}
        }

        function saveMsg(cid, id, text, type, replyTxt = null, imgUrl = null) {
            if (!history[cid]) history[cid] = [];
            const existingIndex = history[cid].findIndex(m => m.id === id);
            if (existingIndex > -1) {
                history[cid][existingIndex].text = text;
            } else {
                history[cid].push({id, text, type, replyTxt, imgUrl});
            }
            localStorage.setItem('tg_history', JSON.stringify(history));
        }

        function addChatUI(id, name) {
            names[id] = name; localStorage.setItem('tg_names', JSON.stringify(names));
            if (document.getElementById(`chat-${id}`)) return;
            const item = document.createElement('div');
            item.id = `chat-${id}`; item.className = 'chat-item';
            const icon = String(id).startsWith('-') ? '📢' : '👤';
            item.innerHTML = `<strong>${icon} ${name}</strong><br><small>ID: ${id}</small>`;
            item.onclick = () => {
                CURRENT_ID = id; cancelReply();
                document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                document.getElementById('chat-header').innerText = `${icon} ${name}`;
                document.getElementById('messages').innerHTML = "";
                (history[id] || []).forEach(m => render(m.id, m.text, m.type, m.replyTxt, m.imgUrl));
            };
            document.getElementById('chat-list').prepend(item);
        }

        function render(id, text, type, replyTxt, imgUrl = null) {
            let existing = document.getElementById(`msg-${id}`);
            if (existing && !imgUrl) { existing.lastChild.nodeValue = text; return; }

            const div = document.createElement('div');
            div.id = `msg-${id}`;
            div.className = `msg ${type}`;
            
            if (replyTxt) {
                const rep = document.createElement('div');
                rep.className = 'reply-block';
                rep.innerText = replyTxt.substring(0, 50) + "...";
                div.appendChild(rep);
            }
            
            if (imgUrl) {
                const img = document.createElement('img');
                img.src = imgUrl;
                img.onclick = () => window.open(imgUrl, '_blank');
                div.appendChild(img);
                if (text && text !== "📷 Фото") {
                    const caption = document.createElement('div');
                    caption.innerText = text;
                    div.appendChild(caption);
                }
            } else {
                div.appendChild(document.createTextNode(text));
            }
            
            div.oncontextmenu = (e) => { e.preventDefault(); openMenu(e, id, type, text); };

            const c = document.getElementById('messages');
            c.appendChild(div);
            setTimeout(() => { c.scrollTop = c.scrollHeight; }, 100);
        }

        async function sendMsg() {
            const i = document.getElementById('msg-input');
            const txt = i.value.trim();
            if (!txt || !CURRENT_ID) return;

            let url = `https://api.telegram.org/bot${BOT_TOKEN}/`;
            let payload = { chat_id: CURRENT_ID, text: txt };

            if (editingMsgId) { url += 'editMessageText'; payload.message_id = editingMsgId; } 
            else { url += 'sendMessage'; if (replyingToId) payload.reply_to_message_id = replyingToId; }

            const res = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const data = await res.json();

            if (data.ok) {
                const msgId = data.result.message_id;
                let replyPreviewTxt = replyingToId && selectedMsg ? selectedMsg.text : null;
                
                if (editingMsgId) {
                    saveMsg(CURRENT_ID, msgId, txt, 'out');
                    render(msgId, txt, 'out'); 
                } else {
                    saveMsg(CURRENT_ID, msgId, txt, 'out', replyPreviewTxt);
                    render(msgId, txt, 'out', replyPreviewTxt);
                }
                i.value = ""; cancelReply();
            }
        }

        async function sendImage(file) {
            if (!CURRENT_ID) return alert("Спочатку оберіть чат!");
            
            const i = document.getElementById('msg-input');
            const caption = i.value.trim();
            i.value = "";

            const tempId = 'temp-' + Date.now();
            const localUrl = URL.createObjectURL(file);
            render(tempId, caption, 'out', null, localUrl);

            const formData = new FormData();
            formData.append('chat_id', CURRENT_ID);
            formData.append('photo', file);
            if (caption) formData.append('caption', caption);
            if (replyingToId) formData.append('reply_to_message_id', replyingToId);

            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                const data = await res.json();
                if (data.ok) {
                    const msgId = data.result.message_id;
                    const photo = data.result.photo[data.result.photo.length - 1];
                    const fileRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${photo.file_id}`);
                    const fileData = await fileRes.json();
                    const tgImgUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${fileData.result.file_path}`;
                    
                    document.getElementById(`msg-${tempId}`).remove();
                    saveMsg(CURRENT_ID, msgId, caption || "📷 Фото", 'out', null, tgImgUrl);
                    render(msgId, caption, 'out', null, tgImgUrl);
                    cancelReply();
                } else {
                    document.getElementById(`msg-${tempId}`).remove();
                    alert("Помилка відправки фото: " + data.description);
                }
            } catch (e) { alert("Помилка мережі"); }
        }

        function handleFileUpload(e) { if(e.target.files.length > 0) sendImage(e.target.files[0]); e.target.value = ""; }

        document.addEventListener('paste', e => {
            if (!CURRENT_ID) return;
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) {
                if (item.type.indexOf('image') === 0) { sendImage(item.getAsFile()); break; }
            }
        });

        const dropZone = document.getElementById('chat-main');
        const dropOverlay = document.getElementById('drop-zone');
        
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropOverlay.style.display = 'flex'; });
        dropZone.addEventListener('dragleave', e => { e.preventDefault(); dropOverlay.style.display = 'none'; });
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropOverlay.style.display = 'none';
            if (e.dataTransfer.files.length > 0 && e.dataTransfer.files[0].type.startsWith('image/')) {
                sendImage(e.dataTransfer.files[0]);
            }
        });

        function openMenu(e, id, type, text) {
            selectedMsg = {id, type, text};
            const menu = document.getElementById('context-menu');
            document.getElementById('menu-edit').style.display = (type === 'out' && text !== "📷 Фото") ? 'flex' : 'none';
            menu.style.display = 'flex';
            menu.style.left = Math.min(e.pageX, window.innerWidth - 160) + 'px';
            menu.style.top = Math.min(e.pageY, window.innerHeight - 150) + 'px';
        }
        function closeMenu() { document.getElementById('context-menu').style.display = 'none'; }
        function actionReply() {
            if (!selectedMsg) return;
            replyingToId = selectedMsg.id; editingMsgId = null;
            document.getElementById('reply-preview').style.display = 'flex';
            document.getElementById('reply-text').innerText = "↩️ Відповідь на: " + selectedMsg.text;
            document.getElementById('msg-input').focus(); closeMenu();
        }
        function actionEdit() {
            if (!selectedMsg || selectedMsg.type !== 'out') return;
            editingMsgId = selectedMsg.id; replyingToId = null;
            document.getElementById('reply-preview').style.display = 'flex';
            document.getElementById('reply-text').innerText = "✏️ Редагування...";
            document.getElementById('msg-input').value = selectedMsg.text;
            document.getElementById('msg-input').focus(); closeMenu();
        }
        function cancelReply() { replyingToId = null; editingMsgId = null; document.getElementById('reply-preview').style.display = 'none'; document.getElementById('msg-input').value = ""; }
        function logout() { localStorage.clear(); location.reload(); }
        
        document.addEventListener('keydown', e => {
            if (e.key === '/' && document.activeElement.tagName !== 'INPUT') { e.preventDefault(); document.getElementById('msg-input').focus(); }
            if (e.key === 'Enter' && document.activeElement.id === 'msg-input') sendMsg();
            if (e.key === 'Escape') { closeMenu(); cancelReply(); }
        });
    </script>
</body>
</html>
